<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS & STT 语音工具</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .header p { color: #888; font-size: 1rem; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: #fff; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; color: #ccc; }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-textarea {
            min-height: 300px;
            resize: vertical;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: #fff; }
        .btn-sm { padding: 8px 16px; font-size: 0.875rem; }
        .result-section { margin-top: 24px; }
        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .result-item-info { flex: 1; }
        .result-item-id { font-weight: 600; color: #667eea; margin-right: 12px; }
        .result-item-text { color: #aaa; font-size: 0.875rem; }
        .result-item-speaker {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 8px;
        }
        .speaker-male { background: rgba(102, 126, 234, 0.3); color: #a0a0ff; }
        .speaker-female { background: rgba(236, 72, 153, 0.3); color: #f9a8d4; }
        .session-list { display: grid; gap: 16px; }
        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .session-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .session-info p { color: #888; font-size: 0.875rem; }
        .session-actions { display: flex; gap: 8px; }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            background: rgba(235, 51, 73, 0.2);
            border: 1px solid rgba(235, 51, 73, 0.5);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .success {
            background: rgba(17, 153, 142, 0.2);
            border: 1px solid rgba(17, 153, 142, 0.5);
            color: #6bffc4;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .tab:hover:not(.active) { background: rgba(255, 255, 255, 0.1); }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
        .range-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #666; margin-top: 4px; }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
        }
        .file-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .file-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #a0a0ff;
        }

        /* STT 样式 */
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .upload-area:hover { border-color: #667eea; background: rgba(102, 126, 234, 0.1); }
        .upload-area.dragover { border-color: #667eea; background: rgba(102, 126, 234, 0.2); }
        .upload-area svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
        .upload-area p { color: #888; margin-bottom: 8px; }
        .upload-area .hint { font-size: 0.8rem; color: #666; }
        .file-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .file-preview svg { width: 32px; height: 32px; color: #667eea; }
        .file-preview .file-info { flex: 1; }
        .file-preview .file-name { font-weight: 500; margin-bottom: 4px; }
        .file-preview .file-size { font-size: 0.8rem; color: #888; }
        .transcript-result {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .transcript-text { font-size: 1.1rem; line-height: 1.8; color: #fff; margin-bottom: 16px; }
        .segments-list { margin-top: 16px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 16px; }
        .segment-item {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .segment-time {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #667eea;
            min-width: 80px;
        }
        .segment-text { color: #ccc; font-size: 0.9rem; }

        /* API 信息样式 */
        .api-section { margin-bottom: 24px; }
        .api-section h3 { font-size: 1rem; color: #fff; margin-bottom: 12px; }
        .code-block {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #a0a0ff;
        }
        .api-endpoint { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .method-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .method-get { background: rgba(17, 153, 142, 0.3); color: #6bffc4; }
        .method-post { background: rgba(102, 126, 234, 0.3); color: #a0a0ff; }
        .endpoint-url { font-family: 'Fira Code', monospace; color: #ccc; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .info-item { background: rgba(0, 0, 0, 0.2); padding: 12px; border-radius: 8px; }
        .info-item label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px; }
        .info-item span { color: #fff; font-family: 'Fira Code', monospace; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_BASE = 'http://192.168.222.20:5000/api';
        const STT_BASE = 'http://192.168.222.20:5001/api';

        // 图标组件
        const Icons = {
            Play: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Download: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Folder: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>,
            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Zip: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>,
            Mic: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>,
            Upload: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Audio: () => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>,
            Code: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>,
            Copy: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
            Users: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        };

        // STT 组件
        function STTTab() {
            const [audioFile, setAudioFile] = useState(null);
            const [language, setLanguage] = useState('en');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');
            const [dragover, setDragover] = useState(false);
            const fileInputRef = useRef(null);

            const handleDrop = (e) => {
                e.preventDefault();
                setDragover(false);
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('audio/')) {
                    setAudioFile(file);
                    setError('');
                } else {
                    setError('请上传音频文件');
                }
            };

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) { setAudioFile(file); setError(''); }
            };

            const formatSize = (bytes) => {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            };

            const handleTranscribe = async () => {
                if (!audioFile) return;
                setLoading(true);
                setError('');
                setResult(null);

                const formData = new FormData();
                formData.append('file', audioFile);
                formData.append('language', language);

                try {
                    const res = await fetch(`${STT_BASE}/stt`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || '转录失败');
                    setResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <>
                    <div className="card">
                        <div className="card-title">上传音频文件</div>
                        <div className={`upload-area ${dragover ? 'dragover' : ''}`}
                            onDragOver={(e) => { e.preventDefault(); setDragover(true); }}
                            onDragLeave={() => setDragover(false)}
                            onDrop={handleDrop}
                            onClick={() => fileInputRef.current?.click()}>
                            <Icons.Upload />
                            <p>拖拽音频文件到此处，或点击选择</p>
                            <span className="hint">支持 webm, wav, mp3, m4a 等格式</span>
                        </div>
                        <input ref={fileInputRef} type="file" accept="audio/*" onChange={handleFileSelect} style={{ display: 'none' }} />
                        {audioFile && (
                            <div className="file-preview">
                                <Icons.Audio />
                                <div className="file-info">
                                    <div className="file-name">{audioFile.name}</div>
                                    <div className="file-size">{formatSize(audioFile.size)}</div>
                                </div>
                                <button className="btn btn-secondary btn-sm" onClick={() => { setAudioFile(null); setResult(null); }}>移除</button>
                            </div>
                        )}
                        <div className="form-row">
                            <div className="form-group">
                                <label className="form-label">识别语言</label>
                                <select className="form-select" value={language} onChange={(e) => setLanguage(e.target.value)}>
                                    <option value="en">English</option>
                                    <option value="zh">中文</option>
                                    <option value="ja">日语</option>
                                    <option value="ko">韩语</option>
                                    <option value="fr">法语</option>
                                    <option value="de">德语</option>
                                    <option value="es">西班牙语</option>
                                </select>
                            </div>
                        </div>
                        {error && <div className="error">{error}</div>}
                        <button className="btn btn-primary" onClick={handleTranscribe} disabled={!audioFile || loading}>
                            {loading ? <><span className="spinner"></span>识别中...</> : <><Icons.Mic />开始识别</>}
                        </button>
                    </div>
                    {result && (
                        <div className="card">
                            <div className="card-title">识别结果</div>
                            <div className="transcript-result">
                                <div className="transcript-text">{result.text}</div>
                                {result.segments && result.segments.length > 0 && (
                                    <div className="segments-list">
                                        <div className="card-title" style={{fontSize: '0.9rem'}}>分段信息</div>
                                        {result.segments.map((seg, idx) => (
                                            <div key={idx} className="segment-item">
                                                <span className="segment-time">{seg.start.toFixed(1)}s - {seg.end.toFixed(1)}s</span>
                                                <span className="segment-text">{seg.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div style={{marginTop: '16px'}}>
                                <button className="btn btn-secondary btn-sm" onClick={() => navigator.clipboard.writeText(result.text)}>
                                    <Icons.Copy />复制文本
                                </button>
                            </div>
                        </div>
                    )}
                    <div className="card">
                        <div className="card-title"><Icons.Code /> API 调用信息</div>
                        <div className="api-section">
                            <h3>接口地址</h3>
                            <div className="api-endpoint">
                                <span className="method-badge method-post">POST</span>
                                <span className="endpoint-url">{STT_BASE}/stt</span>
                            </div>
                            <div className="info-grid">
                                <div className="info-item"><label>Content-Type</label><span>multipart/form-data</span></div>
                                <div className="info-item"><label>支持的格式</label><span>webm, wav, mp3, m4a</span></div>
                            </div>
                        </div>
                        <div className="api-section">
                            <h3>调用示例</h3>
                            <div style={{marginBottom: '16px'}}>
                                <div style={{marginBottom: '8px', color: '#888', fontSize: '0.8rem'}}>Python</div>
                                <div className="code-block">{`import requests
url = "${STT_BASE}/stt"
files = {"file": open("audio.webm", "rb")}
data = {"language": "en"}
response = requests.post(url, files=files, data=data)
print(response.json()["text"])`}</div>
                            </div>
                            <div>
                                <div style={{marginBottom: '8px', color: '#888', fontSize: '0.8rem'}}>cURL</div>
                                <div className="code-block">{`curl -X POST ${STT_BASE}/stt \\
  -F "file=@audio.webm" \\
  -F "language=en"`}</div>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        // 对话合成组件
        function DialogueTab() {
            const [text, setText] = useState('');
            const [topic, setTopic] = useState('');
            const [maleVoice, setMaleVoice] = useState('guy');
            const [femaleVoice, setFemaleVoice] = useState('jenny');
            const [rate, setRate] = useState(0);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');

            const handleSynthesize = async () => {
                if (!text.trim()) { setError('请输入对话文本'); return; }
                setLoading(true);
                setError('');
                setResult(null);

                try {
                    const res = await fetch(`${API_BASE}/dialogue`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text,
                            topic: topic || undefined,
                            maleVoice,
                            femaleVoice,
                            rate: rate >= 0 ? `+${rate}%` : `${rate}%`
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || '合成失败');
                    setResult(data);
                    setText('');
                    setTopic('');
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <>
                    <div className="card">
                        <div className="form-group">
                            <label className="form-label">主题名称（用于文件夹命名）</label>
                            <input type="text" className="form-input" placeholder="例如: Business_Meeting" value={topic} onChange={(e) => setTopic(e.target.value)} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">对话文本</label>
                            <textarea
                                className="form-textarea"
                                placeholder={`支持格式：

【带说话人定义】
Mark(男), Elena(女)
Mark: Hello, how are you?
Elena: I'm fine, thanks!

【自动识别】
Mark: Hello, how are you?
Elena: I'm fine, thanks!

程序会根据常见名字自动识别性别，或按顺序交替。`}
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                            />
                        </div>
                        <div className="form-row">
                            <div className="form-group">
                                <label className="form-label">男声</label>
                                <select className="form-select" value={maleVoice} onChange={(e) => setMaleVoice(e.target.value)}>
                                    <option value="guy">Guy (自然)</option>
                                    <option value="davis">Davis (自然)</option>
                                    <option value="brian">Brian (自然)</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">女声</label>
                                <select className="form-select" value={femaleVoice} onChange={(e) => setFemaleVoice(e.target.value)}>
                                    <option value="jenny">Jenny (自然)</option>
                                    <option value="aria">Aria (自然)</option>
                                    <option value="emma">Emma (自然)</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">语速: {rate > 0 ? '+' : ''}{rate}%</label>
                                <input type="range" min="-50" max="50" value={rate} onChange={(e) => setRate(parseInt(e.target.value))} />
                                <div className="range-label"><span>慢</span><span>正常</span><span>快</span></div>
                            </div>
                        </div>
                        {error && <div className="error">{error}</div>}
                        <button className="btn btn-primary" onClick={handleSynthesize} disabled={loading}>
                            {loading ? <><span className="spinner"></span>合成中...</> : <><Icons.Users />开始合成对话</>}
                        </button>
                    </div>
                    {result && (
                        <div className="card result-section">
                            <div className="card-title">合成完成 - {result.topic}</div>
                            <div className="success">成功生成长语音文件（{result.result.text}）</div>

                            <div style={{margin: '16px 0'}}>
                                <a href={result.download_url} className="btn btn-success">
                                    <Icons.Download />下载完整对话音频
                                </a>
                            </div>

                            {result.result.segments && result.result.segments.length > 0 && (
                                <div style={{marginTop: '20px'}}>
                                    <div className="card-title" style={{fontSize: '0.95rem'}}>对话内容预览</div>
                                    <div className="segments-list">
                                        {result.result.segments.map((seg, idx) => (
                                            <div key={idx} className="segment-item">
                                                <span className={`result-item-speaker ${seg.gender === 'male' ? 'speaker-male' : 'speaker-female'}`}>
                                                    {seg.speaker}
                                                </span>
                                                <span className="segment-text">{seg.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </>
            );
        }

        function App() {
            const [tab, setTab] = useState('synthesize');
            const [text, setText] = useState('');
            const [topic, setTopic] = useState('');
            const [voice, setVoice] = useState('jenny');
            const [rate, setRate] = useState(0);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');
            const [sessions, setSessions] = useState([]);

            const fetchSessions = async () => {
                try {
                    const res = await fetch(`${API_BASE}/sessions`);
                    const data = await res.json();
                    setSessions(data.sessions || []);
                } catch (err) {
                    console.error('获取会话列表失败:', err);
                }
            };

            useEffect(() => {
                if (tab === 'history') fetchSessions();
            }, [tab]);

            const handleSynthesize = async () => {
                if (!text.trim()) { setError('请输入文本'); return; }
                setLoading(true);
                setError('');
                setResult(null);

                try {
                    const res = await fetch(`${API_BASE}/synthesize`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text,
                            topic: topic || undefined,
                            voice,
                            rate: rate >= 0 ? `+${rate}%` : `${rate}%`
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || '合成失败');
                    setResult(data);
                    setText('');
                    setTopic('');
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleDelete = async (topic) => {
                if (!confirm(`确定要删除 "${topic}" 吗？`)) return;
                try {
                    await fetch(`${API_BASE}/sessions/${topic}`, { method: 'DELETE' });
                    fetchSessions();
                } catch (err) {
                    alert('删除失败');
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>TTS & STT 语音工具</h1>
                        <p>文本转语音 & 语音转文本</p>
                    </div>
                    <div className="tabs">
                        <button className={`tab ${tab === 'synthesize' ? 'active' : ''}`} onClick={() => setTab('synthesize')}>合成语音</button>
                        <button className={`tab ${tab === 'dialogue' ? 'active' : ''}`} onClick={() => setTab('dialogue')}>对话合成</button>
                        <button className={`tab ${tab === 'stt' ? 'active' : ''}`} onClick={() => setTab('stt')}>语音转文本</button>
                        <button className={`tab ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>历史记录</button>
                    </div>

                    {tab === 'synthesize' && (
                        <>
                            <div className="card">
                                <div className="form-group">
                                    <label className="form-label">主题名称（用于文件夹命名）</label>
                                    <input type="text" className="form-input" placeholder="例如: Marketing_Campaign" value={topic} onChange={(e) => setTopic(e.target.value)} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">输入文本</label>
                                    <textarea
                                        className="form-textarea"
                                        placeholder={`支持多种格式：

【Q&A 格式】自动提取英文：
Q1\tHello world\t你好世界
Q2\tHow are you?\t你好吗？

【纯英文段落】按段落分割：
This is the first paragraph.

This is the second paragraph.

【单段文本】直接合成：
Just paste your English text here.`}
                                        value={text}
                                        onChange={(e) => setText(e.target.value)}
                                    />
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">语音</label>
                                        <select className="form-select" value={voice} onChange={(e) => setVoice(e.target.value)}>
                                            <option value="jenny">Jenny (女，自然)</option>
                                            <option value="guy">Guy (男，自然)</option>
                                            <option value="aria">Aria (女，自然)</option>
                                            <option value="davis">Davis (男，自然)</option>
                                            <option value="brian">Brian (男，自然)</option>
                                            <option value="emma">Emma (女，自然)</option>
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">语速: {rate > 0 ? '+' : ''}{rate}%</label>
                                        <input type="range" min="-50" max="50" value={rate} onChange={(e) => setRate(parseInt(e.target.value))} />
                                        <div className="range-label"><span>慢</span><span>正常</span><span>快</span></div>
                                    </div>
                                </div>
                                {error && <div className="error">{error}</div>}
                                <button className="btn btn-primary" onClick={handleSynthesize} disabled={loading}>
                                    {loading ? <><span className="spinner"></span>合成中...</> : <><Icons.Play />开始合成</>}
                                </button>
                            </div>
                            {result && (
                                <div className="card result-section">
                                    <div className="card-title">合成完成 - {result.topic}</div>
                                    <div className="success">成功生成 {result.results.length} 个音频文件</div>
                                    {result.results.map((item, idx) => (
                                        <div key={idx} className="result-item">
                                            <div className="result-item-info">
                                                <span className="result-item-id">{item.id}</span>
                                                <span className="result-item-text">{item.text.length > 60 ? item.text.slice(0, 60) + '...' : item.text}</span>
                                            </div>
                                            <a href={`${API_BASE}/download/${result.topic}/${item.file}`} className="btn btn-secondary btn-sm"><Icons.Download />下载</a>
                                        </div>
                                    ))}
                                    <div style={{ marginTop: '20px' }}>
                                        <a href={`${API_BASE}/download/${result.topic}`} className="btn btn-success"><Icons.Zip />下载全部 (ZIP)</a>
                                    </div>
                                </div>
                            )}
                        </>
                    )}

                    {tab === 'dialogue' && <DialogueTab />}
                    {tab === 'stt' && <STTTab />}

                    {tab === 'history' && (
                        <div className="card">
                            <div className="card-title">历史会话</div>
                            {sessions.length === 0 ? (
                                <div className="empty-state"><Icons.Folder /><p>暂无历史记录</p></div>
                            ) : (
                                <div className="session-list">
                                    {sessions.map((session, idx) => {
                                        const isDialogue = session.files.includes('dialogue.mp3');
                                        return (
                                            <div key={idx} className="session-item">
                                                <div className="session-info">
                                                    <h3>
                                                        {session.topic}
                                                        {isDialogue && <span style={{marginLeft: '8px', fontSize: '0.7rem', background: 'rgba(236, 72, 153, 0.3)', color: '#f9a8d4', padding: '2px 8px', borderRadius: '4px'}}>对话</span>}
                                                    </h3>
                                                    <p>{session.file_count} 个音频文件</p>
                                                    <div className="file-list">
                                                        {session.files.slice(0, 6).map(f => <span key={f} className="file-chip"><Icons.Check />{f}</span>)}
                                                        {session.files.length > 6 && <span className="file-chip">+{session.files.length - 6} 更多</span>}
                                                    </div>
                                                </div>
                                                <div className="session-actions">
                                                    {isDialogue ? (
                                                        <a href={`${API_BASE}/download/${session.topic}/dialogue.mp3`} className="btn btn-success btn-sm"><Icons.Download />下载音频</a>
                                                    ) : (
                                                        <a href={`${API_BASE}/download/${session.topic}`} className="btn btn-success btn-sm"><Icons.Zip />下载ZIP</a>
                                                    )}
                                                    <button className="btn btn-danger btn-sm" onClick={() => handleDelete(session.topic)}><Icons.Trash />删除</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
